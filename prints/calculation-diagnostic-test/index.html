<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>計算力・自動化トレーニング ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .portal-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .stage-links {
            display: grid;
            gap: 20px;
        }

        .stage-card {
            display: block;
            text-decoration: none;
            background: #fff;
            border: 2px solid #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .stage-card:hover {
            border-color: #3498db;
            background: #ebf5fb;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }

        .stage-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 5px;
            display: block;
        }

        .stage-desc {
            font-size: 0.9rem;
            color: #666;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="portal-container">
        <h1>計算力・自動化トレーニング</h1>
        <p class="subtitle">反射神経・構造視力・持久力を鍛える</p>

        <div class="stage-links">
            <a href="stage1.html" class="stage-card">
                <span class="stage-title">🚀 第1ステージ：反射神経</span>
                <span class="stage-desc">小数分数変換、2乗、素数判定、瞬発暗算など、計算の「基礎体力」を自動化します。</span>
            </a>

            <a href="stage2.html" class="stage-card">
                <span class="stage-title">⚖️ 第2ステージ：標準計算</span>
                <span class="stage-desc">分配法則、結合法則、数列、約分など、工夫を伴う計算技術を磨きます。</span>
            </a>

            <div class="stage-card" style="opacity: 0.5; cursor: not-allowed;">
                <span class="stage-title">🛡️ 第3ステージ：応用（準備中）</span>
                <span class="stage-desc">複合計算、逆算の技術など、より高度な操作を自動化します。</span>
            </div>
        </div>

        <div class="footer">
            &copy; Sakura Academia Calculation Training System
        </div>
    </div>

</body>

</html>
